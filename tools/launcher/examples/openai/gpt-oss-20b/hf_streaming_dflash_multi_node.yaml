# DFlash streaming speculative decoding pipeline for gpt-oss-20b — MULTI-NODE.
#
# Same streaming transport / dispatch as hf_streaming_eagle3_multi_node.yaml: task_1
# splits N nodes into K serve replicas + (N-K) DDP trainers via SERVE_NODES; hidden
# states move serve -> trainer over NIXL RDMA. DFlash just consumes a different set of
# captured layers and trains a block-diffusion draft instead of an autoregressive one.
# See common/eagle3/train_eagle_streaming.sh for dispatch, rendezvous, and sharding.
#
# gpt-oss-20b notes (vs the dense Qwen3-8B example):
#   - MoE (32 experts, 4 active/token) shipped MXFP4-quantized. The serve already
#     passes --no-enable-flashinfer-autotune (added for NVFP4/MXFP4 MoE: the autotuner
#     re-tunes on the first serving step and can stall a worker past vLLM's
#     execute-model timeout, killing EngineCore). H100 has no FP4 HW, so vLLM
#     dequant/emulates MXFP4 on Hopper.
#   - 24 hidden layers, 5 draft layers -> build_target_layer_ids(24,5)=[1,6,11,16,21]
#     (the draft's fc input) plus the final layer for self-logit distillation. vLLM's
#     capture ids are those +1 -> [2,7,12,17,22], plus final layer 24.
#   - dflash_mask_token_id: gpt-oss has no tokenizer mask token (would fall back to
#     None), so set it explicitly to a reserved/unused vocab slot, <|reserved_200013|>.
#
# 3-step pipeline:
#   task_0: Build input conversations (jsonl)
#   task_1: Streaming train — 2 serve nodes (2 GPU, TP=2) + 2 trainer nodes (2 GPU)
#   task_2: vLLM smoke test with DFlash speculative decoding
#
# Usage:
#   uv run launch.py --yaml examples/openai/gpt-oss-20b/hf_streaming_dflash_multi_node.yaml --yes

job_name: gpt-oss-20b_DFlash_streaming_multi_node
pipeline:
  allow_to_fail: false
  skip: false
  note:

  global_vars:
    hf_model: /hf-local/openai/gpt-oss-20b

  # Step 1: Build input conversations
  task_0:
    script: common/eagle3/make_dataset.sh
    args:
      - -f modules/Model-Optimizer/examples/dataset/example_data_config.yaml
      - --full-conversations
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10

  # Step 2: Streaming DFlash training — 2 serve replicas (TP=2) + 2 trainer nodes (2 GPU each).
  # DFlash extracts 5 target layers (build_target_layer_ids(24,5)=[1,6,11,16,21], the
  # draft's fc input) plus the final layer for self-logit distillation. vLLM's capture
  # ids are those +1 -> [2,7,12,17,22], plus final layer 24.
  task_1:
    script: common/eagle3/train_eagle_streaming.sh
    args:
      - --config modules/Model-Optimizer/modelopt_recipes/general/speculative_decoding/dflash.yaml
      - model.model_name_or_path=<<global_vars.hf_model>>
      - model.use_fake_base_for_offline=true
      - data.mode=streaming
      - data.data_path=/scratchspace/data/train.jsonl
      - training.output_dir=/scratchspace/dflash
      - training.training_seq_len=4096
      - training.disable_tqdm=true
      # Supervise only the assistant content, not the prompt. The serve captures hidden
      # states over the full corpus conversation (it does not generate), so the prompt +
      # gpt-oss Harmony boilerplate is present; training over the full sequence
      # (answer_only_loss=false) lets the draft trivially memorize that boilerplate ->
      # inflated train metrics that don't translate to real acceptance. The training-only
      # chat template adds {% generation %} tags so the tokenizer emits the assistant mask
      # (byte-identical tokenization to the stock template otherwise).
      - training.answer_only_loss=true
      - data.chat_template=examples/openai/gpt-oss-20b/chat_template_train.jinja
      - training.num_train_epochs=1
      - training.max_steps=2000
      # dflash.yaml sets report_to=tensorboard, which hard-fails if tensorboard
      # isn't in the serve container; the streaming trainer doesn't need it.
      - training.report_to=none
      - dflash.dflash_block_size=16
      - dflash.dflash_num_anchors=512
      - dflash.dflash_loss_decay_factor=7
      # gpt-oss has no tokenizer mask token; use a reserved vocab slot (<|reserved_200013|>).
      - dflash.dflash_mask_token_id=200013
      - dflash.dflash_architecture_config.num_hidden_layers=5
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      # No spaces: nemo_run emits `export FOO=value` unquoted.
      - EAGLE_CAPTURE_IDS: "[2,7,12,17,22,24]"
      - SERVE_TP: "2"
      # extract_hidden_states packs all 6 capture layers into one KV spec (per-token 6*hidden_size*2B=34560); block_size must make the attn page 2*block_size*(num_kv_heads/SERVE_TP)*head_dim*2 >= that, so at TP=2 (4 kv_heads/rank) need >=64.
      - SERVE_EXTRA_ARGS: "--block-size=64"
      # K serve replica nodes (Slurm nodes 0..K-1); the rest are trainers.
      - SERVE_NODES: "2"
      # Per-rank in-flight fetches; keep low so the cold serve isn't flooded past its execute-model timeout.
      - STREAMING_NUM_WORKERS: "4"
      # DFlash uses a custom modeling file; export must trust remote code.
      - EXPORT_EXTRA_ARGS: "--trust_remote_code"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 4
      ntasks_per_node: 1
      gpus_per_node: 2
      container: vllm/vllm-openai:latest

  # Step 3: vLLM smoke test (DFlash, uses exported checkpoint from training)
  task_2:
    script: common/specdec/vllm_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - DRAFT_MODEL: /scratchspace/export
      - SPEC_METHOD: "dflash"
      - NUM_SPEC_TOKENS: "7"
      - MIN_ACCEPTANCE_LENGTH: "1.2"
    slurm_config:
      _factory_: "slurm_factory"
      container: "vllm/vllm-openai:nightly"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
