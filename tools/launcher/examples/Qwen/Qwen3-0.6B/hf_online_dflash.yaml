# DFlash online speculative decoding training for Qwen3-0.6B.
#
# Lightweight single-GPU regression test. Uses synthetic_conversations_1k.jsonl
# (packaged with the code) — no external data dependencies.
#
# Trains for 3 epochs on 1K samples, logs loss every 100 steps.
#
# Convergence baseline (L40, batch_size=2, seq_len=512, 2-layer draft):
#   Step  100 (epoch 0.2): loss=6.59  acc=0.079
#   Step  500 (epoch 1.0): loss=1.78  acc=0.525
#   Step 1000 (epoch 2.0): loss=1.13  acc=0.580
#   Step 1500 (epoch 3.0): loss=1.11  acc=0.595
#
# Regression criteria (set via environment):
#   MAX_FINAL_LOSS: final loss must be below this (default: 2.0)
#   MIN_FINAL_ACC:  final accuracy must be above this (default: 0.40)
#
# Reference: "DFlash: Block Diffusion for Flash Speculative Decoding" (arXiv:2602.06036)
#
# Usage:
#   uv run launch.py --yaml examples/Qwen/Qwen3-0.6B/hf_online_dflash.yaml --yes
#   uv run launch.py --yaml examples/Qwen/Qwen3-0.6B/hf_online_dflash.yaml hf_local=/mnt/hf-local --yes

job_name: Qwen3-0.6B_DFlash_regression
pipeline:
  global_vars:
    hf_model: /hf-local/Qwen/Qwen3-0.6B

  task_0:
    script: common/specdec/dflash_online_training.sh
    args:
      - --config modules/Model-Optimizer/modelopt_recipes/general/speculative_decoding/dflash.yaml
      - model.model_name_or_path=<<global_vars.hf_model>>
      - data.data_path=modules/Model-Optimizer/examples/dataset/synthetic_conversations_1k.jsonl
      - data.chat_template=examples/Qwen/Qwen3-0.6B/chat_template_train.jinja
      - training.output_dir=/scratchspace/dflash_qwen3_0.6b
      - training.num_train_epochs=3
      - training.training_seq_len=512
      - training.per_device_train_batch_size=2
      - training.save_steps=500
      - training.logging_steps=100
      - training.disable_tqdm=true
      - training.answer_only_loss=true
      - dflash.dflash_block_size=8
      - dflash.dflash_mask_token_id=151669
      - dflash.dflash_use_torch_compile=False
      - dflash.dflash_architecture_config.num_hidden_layers=2
    environment:
      - MAX_FINAL_LOSS: "2.0"
      - MIN_FINAL_ACC: "0.40"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
