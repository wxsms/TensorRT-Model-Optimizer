# Qwen3-8B PTQ quantization (8 GPUs, for Slurm clusters).
#
# 3-step pipeline:
#   task_0: NVFP4 quantize → MMLU → export
#   task_1: FP8 quantize → MMLU → export
#   task_2: TRT-LLM eval MMLU on all exported checkpoints
#
# Usage:
#   uv run launch.py --yaml examples/Qwen/Qwen3-8B/megatron_lm_ptq.yaml --yes
#
# For single-GPU local Docker, use megatron_lm_ptq_local.yaml instead.
#
# NOTE: This file uses the raw `script`/`args`/`environment` form because the
# typed `MegatronLMQuantizeTask` (common/megatron_lm/quantize/task.py) is
# currently not wired into SandboxPipeline — see the docstring there for
# rationale. The typed class is retained for future re-enablement.

job_name: Qwen3-8B_PTQ
pipeline:
  skip: false
  allow_to_fail: false
  note:

  task_0:
    script: common/megatron_lm/quantize/quantize.sh
    args:
      - --calib-dataset-path-or-name /hf-local/abisee/cnn_dailymail
      - --calib-size 32
    environment:
      - MLM_MODEL_CFG: Qwen/Qwen3-8B
      - QUANT_CFG: NVFP4_DEFAULT_CFG
      - HF_MODEL_CKPT: /hf-local/Qwen/Qwen3-8B
      - MMLU_DATASET: /hf-local/cais/mmlu
      - TP: "1"
      - PP: "1"
      - EP: "1"
      - ETP: "1"
      - MMLU_LOWER_BOUND: "0.68"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1

  task_1:
    script: common/megatron_lm/quantize/quantize.sh
    args:
      - --calib-dataset-path-or-name /hf-local/abisee/cnn_dailymail
      - --calib-size 32
    environment:
      - MLM_MODEL_CFG: Qwen/Qwen3-8B
      - QUANT_CFG: FP8_DEFAULT_CFG
      - HF_MODEL_CKPT: /hf-local/Qwen/Qwen3-8B
      - MMLU_DATASET: /hf-local/cais/mmlu
      - TP: "1"
      - PP: "1"
      - EP: "1"
      - ETP: "1"
      - MMLU_LOWER_BOUND: "0.75"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1

  # Step 3: TRT-LLM eval MMLU on all exported checkpoints
  task_2:
    script: common/tensorrt_llm/eval.sh
    environment:
      - HF_MODEL_CKPT: /scratchspace/export
      - TP: "1"
      - EP: "1"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
