# DFlash online speculative decoding training for Qwen3-8B.
#
# 3-step pipeline:
#   task_0: Online DFlash training
#   task_1: vLLM smoke test with DFlash speculative decoding
#   task_2: MT-Bench per-category HF AR evaluation (1 GPU)
#
# Reference: "DFlash: Block Diffusion for Flash Speculative Decoding" (arXiv:2602.06036)
#
# Usage:
#   uv run launch.py --yaml examples/Qwen/Qwen3-8B/hf_online_dflash.yaml --yes
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/Qwen/Qwen3-8B/hf_online_dflash.yaml --yes

job_name: Qwen3-8B_DFlash_online
pipeline:
  global_vars:
    hf_model: /hf-local/Qwen/Qwen3-8B

  # Step 1: Online DFlash training
  task_0:
    script: common/specdec/dflash_online_training.sh
    args:
      - --config modules/Model-Optimizer/modelopt_recipes/general/speculative_decoding/dflash.yaml
      - model.model_name_or_path=<<global_vars.hf_model>>
      - data.data_path=/hf-local/modelopt/Speculative-Decoding-Dataset-v1-Qwen3-8B/sample-1K-openai.jsonl
      - data.chat_template=examples/Qwen/Qwen3-8B/chat_template_train.jinja
      - training.output_dir=/scratchspace/dflash_bs16
      - training.num_train_epochs=1
      - training.training_seq_len=4096
      - training.save_steps=5000
      - training.logging_steps=1000
      - training.disable_tqdm=true
      - training.answer_only_loss=true
      - dflash.dflash_block_size=16
      - dflash.dflash_num_anchors=512
      - dflash.dflash_loss_decay_factor=7
      - dflash.dflash_mask_token_id=151669
      - dflash.dflash_architecture_config.num_hidden_layers=5
    environment:
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 8

  # Step 2: vLLM smoke test (uses exported checkpoint from training)
  task_1:
    script: common/specdec/vllm_smoke_test.sh
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - DRAFT_CKPT_DIR: /scratchspace/dflash_bs16
      - SPEC_METHOD: "dflash"
      - NUM_SPEC_TOKENS: "7"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1

  # Step 3: HF AR evaluation
  task_2:
    script: common/specdec/ar_eval_mtbench.sh
    args:
      - --ckpt_dir /scratchspace/dflash_bs16
      - --osl 512
      - --steps 15
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
