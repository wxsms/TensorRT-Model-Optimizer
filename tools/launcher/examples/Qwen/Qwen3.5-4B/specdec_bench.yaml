# SPEED-bench smoke run for Qwen3.5-4B via vLLM (autoregressive baseline).
#
# Reads nvidia/SPEED-Bench-Internal/qualitative through Qwen/Qwen3.5-4B with
# --speculative_algorithm NONE (no draft model) and writes timing.json +
# aa_timing.json + acceptance_rate.json + specbench_responses.jsonl +
# specbench_results.json to /scratchspace/specdec_bench/.
#
# The qwen3_5 model_type needs transformers >= 4.58, which is NOT in
# vllm/vllm-openai:latest yet — use the qwen3_5-cu130 tag instead.
#
# Local run:
#   uv run launch.py --yaml examples/Qwen/Qwen3.5-4B/specdec_bench.yaml \
#       hf_local=/home/omniml_data_3/hf-local --yes
#
# Slurm run on cw_dfw (where Qwen3.5-4B and SPEED-Bench-Internal are staged):
#   uv run slurm.py --yaml modules/Model-Optimizer/tools/launcher/examples/Qwen/Qwen3.5-4B/specdec_bench.yaml --yes

job_name: Qwen3.5-4B_specdec_bench

pipeline:
  global_vars:
    hf_model: /hf-local/Qwen/Qwen3.5-4B

  task_0:
    script: common/specdec_bench/run.sh
    args:
      - --dataset speed
      - --dataset_path /hf-local/nvidia/SPEED-Bench-Internal/qualitative
      - --engine VLLM
      - --speculative_algorithm NONE
      - --tp_size 1
      - --ep_size 1
      - --concurrency 1
      - --num_requests 80
      - --output_length 4096
      - --aa_timing
      - --show_progress
      - --save_dir /scratchspace/specdec_bench
    environment:
      - HF_MODEL_CKPT: <<global_vars.hf_model>>
      - HF_LOCAL: /hf-local
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 1
      gpus_per_node: 1
      container: vllm/vllm-openai:qwen3_5-cu130
