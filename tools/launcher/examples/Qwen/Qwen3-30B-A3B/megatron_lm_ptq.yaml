# Qwen3-30B-A3B PTQ quantization (8 GPUs, MoE model).
#
# 2-step pipeline: NVFP4 then FP8, each followed by MMLU evaluation.
# MMLU uses EP for expert parallelism.
#
# Usage:
#   uv run launch.py --yaml examples/Qwen/Qwen3-30B-A3B/megatron_lm_ptq.yaml --yes
#
# NOTE: This file uses the raw `script`/`args`/`environment` form because the
# typed `MegatronLMQuantizeTask` (common/megatron_lm/quantize/task.py) is
# currently not wired into SandboxPipeline — see the docstring there for
# rationale. The typed class is retained for future re-enablement.

job_name: Qwen3-30B-A3B_PTQ
pipeline:
  skip: false
  allow_to_fail: false
  note:

  task_0:
    script: common/megatron_lm/quantize/quantize.sh
    args:
      - --calib-dataset-path-or-name /hf-local/abisee/cnn_dailymail
      - --calib-size 32
    environment:
      - MLM_MODEL_CFG: Qwen/Qwen3-30B-A3B
      - QUANT_CFG: NVFP4_DEFAULT_CFG
      - HF_MODEL_CKPT: /hf-local/Qwen/Qwen3-30B-A3B
      - MMLU_DATASET: /hf-local/cais/mmlu
      - TP: "1"
      - PP: "1"
      - EP: "8"
      - ETP: "1"
      - MMLU_LOWER_BOUND: "0.75"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 8
      gpus_per_node: 8

  task_1:
    script: common/megatron_lm/quantize/quantize.sh
    args:
      - --calib-dataset-path-or-name /hf-local/abisee/cnn_dailymail
      - --calib-size 32
    environment:
      - MLM_MODEL_CFG: Qwen/Qwen3-30B-A3B
      - QUANT_CFG: FP8_DEFAULT_CFG
      - HF_MODEL_CKPT: /hf-local/Qwen/Qwen3-30B-A3B
      - MMLU_DATASET: /hf-local/cais/mmlu
      - TP: "1"
      - PP: "1"
      - EP: "8"
      - ETP: "1"
      - MMLU_LOWER_BOUND: "0.75"
    slurm_config:
      _factory_: "slurm_factory"
      nodes: 1
      ntasks_per_node: 8
      gpus_per_node: 8
