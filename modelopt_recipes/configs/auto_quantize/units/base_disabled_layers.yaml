# Base set of non-quantizable layer patterns excluded from the AutoQuantize search (gates,
# routers, conv/mixer projections, output/embedding heads, vision towers). Spliced into a
# recipe's ``disabled_layers`` via ``$import``; recipes append architecture-specific patterns.

# modelopt-schema: modelopt.recipe.config.LayerPatternList
  - "*block_sparse_moe.gate*"
  - "*linear_attn.conv1d*"
  - "*linear_attn.in_proj_a*"
  - "*linear_attn.in_proj_b*"
  - "*mixer.conv1d*"
  - "*mlp.gate.*"
  - "*mlp.shared_expert_gate.*"
  - "*output_layer*"
  - "*proj_out.*"
  - "*router*"
  - "output.*"
  - "*embed_vision*"
  - "*vision_tower*"
  - "*visual*"
  # Qwen3.6 MoE (e.g. Qwen/Qwen3.6-35B-A3B): must be disabled or export fails at linear fusion.
  # Kept in the base set because the deprecated --auto_quantize_* CLI can't inject arch patterns.
  - "*shared_expert_gate*"
