# Static NVFP4 E2M1 weight quantizer with Four-Over-Six (4/6) enabled (256 FP8 scale normalization).
# The per-block M=6 vs M=4 choice is made by the calibration algorithm (MSE), configured in the preset.

# modelopt-schema: modelopt.torch.quantization.config.QuantizerAttributeConfig
num_bits: e2m1
block_sizes:
  -1: 16
  type: static
  scale_bits: e4m3
  four_over_six: true
