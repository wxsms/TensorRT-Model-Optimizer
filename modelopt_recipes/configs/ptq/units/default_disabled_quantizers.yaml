# QuantizerCfgList snippet for standard module patterns that should remain unquantized.

# modelopt-schema: modelopt.torch.quantization.config.QuantizerCfgListConfig
  - quantizer_name: '*block_sparse_moe.gate*'
    enable: false
  - quantizer_name: '*linear_attn.conv1d*'
    enable: false
  - quantizer_name: '*linear_attn.in_proj_a*'
    enable: false
  - quantizer_name: '*linear_attn.in_proj_b*'
    enable: false
  - quantizer_name: '*lm_head*'
    enable: false
  - quantizer_name: '*mixer.conv1d*'
    enable: false
  - quantizer_name: '*mlp.gate.*'
    enable: false
  - quantizer_name: '*mlp.shared_expert_gate.*'
    enable: false
  - quantizer_name: '*output_layer*'
    enable: false
  - quantizer_name: '*proj_out.*'
    enable: false
  - quantizer_name: '*router*'
    enable: false
  - quantizer_name: 'output.*'
    enable: false
  # Multimodal vision branch: keep the vision encoder (SigLIP / ViT) and any
  # multimodal embedding projection in BF16 by default. Recipes that enable bare
  # `*weight_quantizer` / `*input_quantizer` or `*mlp*` wildcards otherwise also
  # match the vision tower (`model.vision_tower.*`, `model.visual.*`,
  # Llama-4 `vision_model.*`) and the embedding projection (`model.embed_vision.*`,
  # Llama-4 `multi_modal_projector.*`); quantizing the vision branch crashes
  # export / produces garbage image embeddings on VL models (gemma-4,
  # Qwen3.5-VL — NVBugs 6293731, 6293762, 6294017; Llama-4-Scout — NVBugs
  # 6359097, where `vision_model.patch_embedding.linear` has in_features=588,
  # not divisible by the NVFP4 block size). A recipe that intentionally
  # quantizes vision must re-enable these after importing this unit.
  - quantizer_name: '*embed_vision*'
    enable: false
  - quantizer_name: '*vision_tower*'
    enable: false
  - quantizer_name: '*visual*'
    enable: false
  - quantizer_name: '*vision_model*'
    enable: false
  - quantizer_name: '*multi_modal_projector*'
    enable: false
  - parent_class: 'nn.BatchNorm1d'
    quantizer_name: '*'
    enable: false
  - parent_class: 'nn.BatchNorm2d'
    quantizer_name: '*'
    enable: false
  - parent_class: 'nn.BatchNorm3d'
    quantizer_name: '*'
    enable: false
  - parent_class: 'nn.LeakyReLU'
    quantizer_name: '*'
    enable: false
  - parent_class: 'nn.Embedding'
    quantizer_name: '*'
    enable: false
