metadata:
  recipe_type: ptq
  description: NVFP4 static weight and dynamic activation for MoE/MLP projections (W4A4), FP8 KV cache, max calibration.
ptq_cfg:
  algorithm: max
  quant_cfg:
    '*moe*weight_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits: e4m3
      num_bits: e2m1
      enable: true
    '*moe*input_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits: e4m3
      num_bits: e2m1
      enable: true
    '*mlp*weight_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits: e4m3
      num_bits: e2m1
      enable: true
    '*mlp*input_quantizer':
      block_sizes:
        -1: 16
        type: dynamic
        scale_bits: e4m3
      num_bits: e2m1
      enable: true
    '*share_expert*':
      enable: false
    '*moe.gate.*':
      enable: false
    default:
      enable: false
    '*linear_attn.conv1d*':
      enable: false
    '*lm_head*':
      enable: false
    '*mixer.conv1d*':
      enable: false
    '*output_layer*':
      enable: false
    '*proj_out.*':
      enable: false
    '*router*':
      enable: false
    output.*:
      enable: false
    nn.BatchNorm1d:
      '*':
        enable: false
    nn.BatchNorm2d:
      '*':
        enable: false
    nn.BatchNorm3d:
      '*':
        enable: false
    nn.LeakyReLU:
      '*':
        enable: false
    '*[kv]_bmm_quantizer':
      num_bits: e4m3
      enable: true
