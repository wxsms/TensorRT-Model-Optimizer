# Model-specific PTQ recipe for Step3.5-Flash NVFP4 MLP/MoE quantization with FP8 KV cache.

imports:
  fp8: configs/numerics/fp8
  nvfp4: configs/numerics/nvfp4

metadata:
  recipe_type: ptq
  description: >-
    Step3.5-Flash PTQ recipe that enables dynamic NVFP4 on MoE/MLP weight and input quantizers,
    enables FP8 KV-cache quantizers, and leaves other quantizers disabled.
quantize:
  algorithm: max
  quant_cfg:
    - quantizer_name: '*'
      enable: false
    - quantizer_name: '*moe*weight_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*moe*input_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*mlp*weight_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*mlp*input_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*[kv]_bmm_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*share_expert*'
      enable: false
    - quantizer_name: '*moe.gate.*'
      enable: false
    - quantizer_name: '*linear_attn.conv1d*'
      enable: false
    - quantizer_name: '*lm_head*'
      enable: false
    - quantizer_name: '*mixer.conv1d*'
      enable: false
    - quantizer_name: '*output_layer*'
      enable: false
    - quantizer_name: '*proj_out.*'
      enable: false
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: 'output.*'
      enable: false
    - parent_class: 'nn.BatchNorm1d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_name: '*'
      enable: false
