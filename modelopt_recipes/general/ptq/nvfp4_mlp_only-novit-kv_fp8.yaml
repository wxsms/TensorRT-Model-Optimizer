# Composed PTQ recipe for MLP/MoE-only dynamic NVFP4 quantization with FP8 KV-cache
# quantization, with the multimodal vision tower EXCLUDED from quantization.
#
# Identical to `nvfp4_mlp_only-kv_fp8` except for the trailing `*visual*` /
# `*vision_tower*` disable rules. The bare `*mlp*` enable rules below match BOTH
# the language-model MLPs (`model.language_model.layers.*.mlp`) AND the vision
# tower's block MLPs (e.g. Kimi-K2.5 `vision_tower.encoder.blocks.*.mlp.*`,
# Qwen3.5-VL `model.visual.blocks.*.mlp`). Quantizing the ViT FFNs to NVFP4 is
# both quality-harmful (degenerate image embeddings) and can fail export: the
# Kimi-K2.5 MoonViT `vt_intermediate_size=4304` is not divisible by the NVFP4
# packing constraint (2 x group_size = 32), so the compressed-tensors export
# raises `tensor column shape must be divisible by the given group_size 32`.
# The vision branch is small and quant-sensitive, so it is kept in BF16,
# mirroring `nvfp4_mlp_only_mse-kv_fp8_cast-novit` and NVIDIA's reference
# `nvidia/Kimi-K2.5-NVFP4` checkpoint (which excludes the vision tower and
# multimodal projector).

imports:
  base_disable_all: configs/ptq/units/base_disable_all
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
  nvfp4: configs/numerics/nvfp4
  kv_fp8: configs/ptq/units/kv_fp8

metadata:
  recipe_type: ptq
  description: >-
    Applies dynamic NVFP4 only to MLP/MoE weight and input quantizers, plus FP8 KV-cache
    quantization; uses max calibration. Vision tower (model.visual.* / vision_tower.*)
    excluded for VL models.
quantize:
  algorithm: max
  quant_cfg:
    - $import: base_disable_all
    - quantizer_name: '*mlp*weight_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*mlp*input_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*block_sparse_moe*weight_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*block_sparse_moe*input_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*.experts.*weight_quantizer'
      cfg:
        $import: nvfp4
    - quantizer_name: '*.experts.*input_quantizer'
      cfg:
        $import: nvfp4
    - $import: kv_fp8
    - $import: default_disabled_quantizers
    # VL vision-branch exclusion: keep the ViT (and its block MLPs) in BF16.
    # Must come after the `*mlp*` enables above so the disable wins (later
    # entries override earlier ones).
    - quantizer_name: '*visual*'
      enable: false
    - quantizer_name: '*vision_tower*'
      enable: false
