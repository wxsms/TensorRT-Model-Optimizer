metadata:
  recipe_type: ptq
  description: FP8 per-tensor weight and activation (W8A8), FP8 KV cache, max calibration.
ptq_cfg:
  algorithm: max
  quant_cfg:
    '*input_quantizer':
      num_bits: e4m3
      axis:
    '*weight_quantizer':
      num_bits: e4m3
      axis:
    default:
      enable: false
    '*block_sparse_moe.gate*':
      enable: false
    '*linear_attn.conv1d*':
      enable: false
    '*lm_head*':
      enable: false
    '*mixer.conv1d*':
      enable: false
    '*mlp.gate.*':
      enable: false
    '*mlp.shared_expert_gate.*':
      enable: false
    '*output_layer*':
      enable: false
    '*proj_out.*':
      enable: false
    '*router*':
      enable: false
    output.*:
      enable: false
    nn.BatchNorm1d:
      '*':
        enable: false
    nn.BatchNorm2d:
      '*':
        enable: false
    nn.BatchNorm3d:
      '*':
        enable: false
    nn.LeakyReLU:
      '*':
        enable: false
    '*[kv]_bmm_quantizer':
      num_bits: e4m3
      enable: true
