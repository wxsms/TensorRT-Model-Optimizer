# Composed PTQ recipe for NVFP4 W4A16 weight-only quantization with FP8 KV-cache cast mode.

imports:
  base_disable_all: configs/ptq/units/base_disable_all
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
  w4a16_nvfp4: configs/ptq/units/w4_nvfp4
  kv_fp8_cast: configs/ptq/units/kv_fp8_cast

metadata:
  recipe_type: ptq
  description: >-
    NVFP4 W4A16 weight-only, BF16 activations, plus FP8 KV-cache cast mode using constant amax; uses
    max calibration. No calibration forward pass required.
quantize:
  algorithm: max
  quant_cfg:
    - $import: base_disable_all
    - $import: w4a16_nvfp4
    - $import: kv_fp8_cast
    - $import: default_disabled_quantizers
