metadata:
  recipe_type: ptq
  description: >-
    Learns one shared pre-quantization and post-quantization NVFP4 weight scale with MSE
    initialization and FP8 scale sweep; uses dynamic NVFP4 activations and FP8 KV cache.
    QAT/QAD-only: the LSQ scales are learned during training, so this recipe is not
    suitable for calibration-only PTQ.
imports:
  base_disable_all: configs/ptq/units/base_disable_all
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
  kv_fp8: configs/ptq/units/kv_fp8
  nvfp4: configs/numerics/nvfp4
  nvfp4_static: configs/numerics/nvfp4_static
quantize:
  algorithm:
    method: lsq
    learnable_amax:
      - pre
      - post
    tied_amax: true
    quantize_pre_scale: true
    scale_algorithm:
      method: mse
      fp8_scale_sweep: true
  quant_cfg:
    - $import: base_disable_all
    - quantizer_name: '*weight_quantizer'
      cfg:
        $import: nvfp4_static
    - quantizer_name: '*input_quantizer'
      cfg:
        $import: nvfp4
    - $import: kv_fp8
    - $import: default_disabled_quantizers
