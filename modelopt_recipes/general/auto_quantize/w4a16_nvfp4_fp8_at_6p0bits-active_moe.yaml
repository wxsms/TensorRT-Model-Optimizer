# AutoQuantize recipe: per-layer search over {FP8 (W8A8), NVFP4 weight-only (W4A16)}
# at 6.0 effective bits, active-MoE cost model. Recipe form of the CLI command:
#   --qformat fp8,w4a16_nvfp4 --auto_quantize_bits 6.0 --auto_quantize_method gradient
#   --auto_quantize_cost_model active_moe --auto_quantize_active_moe_expert_ratio 0.03125

# modelopt-schema: modelopt.recipe.config.ModelOptAutoQuantizeRecipe
imports:
  base_disabled_layers: configs/auto_quantize/units/base_disabled_layers
  fp8: configs/ptq/presets/model/fp8
  w4a16_nvfp4: configs/ptq/presets/model/w4a16_nvfp4

metadata:
  recipe_type: auto_quantize
  description: >-
    Mixed FP8 + NVFP4-weight-only per-layer search at 6.0 effective bits with the
    active-MoE cost model (expert ratio 0.03125).

auto_quantize:
  constraints:
    effective_bits: 6.0
    cost_model: active_moe
    cost:
      active_moe_expert_ratio: 0.03125

  candidate_formats:
    # LP cost comes from the presets' numerics (NVFP4 weight = 4.5 via configs/numerics/nvfp4,
    # FP8 = 8); no per-candidate effective_bits override needed.
    - $import: fp8
    - $import: w4a16_nvfp4

  auto_quantize_method: gradient
  score_size: 128
  # kv_cache omitted -> falls back to --kv_cache_qformat (none in the reference command).

  # Base (model-agnostic) non-quantizable layers. Arch-specific models use a recipe under
  # huggingface/<model>/auto_quantize/ that extends this set.
  disabled_layers:
    - $import: base_disabled_layers
