# QuantizerCfgList snippet of disabled quantizers for DiffusionGemma. Splices
# in the standard ``default_disabled_quantizers`` exclusions and appends the
# DiffusionGemma-specific self-conditioning network so that text-only PTQ
# calibration data doesn't trip on its uncalibrated TensorQuantizers (export
# would otherwise crash with "AttributeError: 'TensorQuantizer' object has no
# attribute '_amax'"). Recipes that import this should NOT also import
# ``default_disabled_quantizers``.

# modelopt-schema: modelopt.torch.quantization.config.QuantizerCfgListConfig
imports:
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
---
  - $import: default_disabled_quantizers
  - quantizer_name: '*self_conditioning*'
    enable: false
