imports:
  base_disable_all: configs/ptq/units/base_disable_all
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
  nvfp4: configs/numerics/nvfp4
  nvfp4_static: configs/numerics/nvfp4_static

metadata:
  recipe_type: ptq
  description: >-
    MiniMax-M3 routed-experts-only NVFP4 PTQ with MSE-calibrated static
    weights and dynamic activations; shared experts and the KV cache stay
    BF16.

quantize:
  algorithm:
    method: mse
    fp8_scale_sweep: false
  quant_cfg:
    - $import: base_disable_all
    - quantizer_name: "*mlp.experts*weight_quantizer"
      cfg: {$import: nvfp4_static}
    - quantizer_name: "*mlp.experts*input_quantizer"
      cfg: {$import: nvfp4}
    - quantizer_name: "*block_sparse_moe.experts.*weight_quantizer"
      cfg: {$import: nvfp4_static}
    - quantizer_name: "*block_sparse_moe.experts.*input_quantizer"
      cfg: {$import: nvfp4}
    - quantizer_name: "*shared_experts*"
      enable: false
    - $import: default_disabled_quantizers
