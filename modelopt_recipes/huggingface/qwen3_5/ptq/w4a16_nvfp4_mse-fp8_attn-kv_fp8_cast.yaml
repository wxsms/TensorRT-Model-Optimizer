# W4A16 (NVFP4 weights, MSE calibration) MLP / FP8 attention / FP8 KV-cast PTQ
# recipe for HuggingFace `qwen3_5` (dense) models. Covers Qwen3.5 and Qwen3.6
# dense releases, which share the `qwen3_5` model_type and hybrid
# linear-attention + softmax-attention architecture. MSE variant of
# `w4a16_nvfp4-fp8_attn-kv_fp8_cast.yaml`: NVFP4 weight scales come from an MSE
# FP8-scale sweep instead of max calibration. Shares its `quant_cfg` with the
# MoE counterpart at
# `huggingface/qwen3_5_moe/ptq/w4a16_nvfp4_mse-fp8_attn-kv_fp8_cast.yaml`;
# the snippet lives under
# `huggingface/qwen3_5/ptq/w4a16_nvfp4_mse-fp8_attn-kv_fp8_cast.quant_cfg.yaml`.

imports:
  shared_quant_cfg: huggingface/qwen3_5/ptq/w4a16_nvfp4_mse-fp8_attn-kv_fp8_cast.quant_cfg

metadata:
  recipe_type: ptq
  description: >-
    W4A16 (NVFP4 weights, MSE calibration) MLP / FP8 attention / FP8 KV-cast PTQ
    recipe for HuggingFace `qwen3_5` (dense) models: NVFP4 with static scales
    from an MSE FP8-scale sweep for MLP projection weights and lm_head; FP8 for
    self-attention and the large linear-attention projections; FP8 KV cache with
    constant amax.
quantize:
  algorithm:
    method: mse
    fp8_scale_sweep: true
    layerwise: false
  quant_cfg:
    - $import: shared_quant_cfg
