# Qwen3.6 MoE AutoQuantize: mixed FP8 + NVFP4 weight-only at 6.0 effective bits, active-MoE
# cost model. Carries the architecture's disabled-layer patterns explicitly in the recipe
# (the set kept in sync with example_utils._get_auto_quantize_disabled_layers for a Qwen model;
# pinned by tests/examples/llm_ptq/test_hf_ptq_args.py).

# modelopt-schema: modelopt.recipe.config.ModelOptAutoQuantizeRecipe
imports:
  base_disabled_layers: configs/auto_quantize/units/base_disabled_layers
  fp8: configs/ptq/presets/model/fp8
  w4a16_nvfp4: configs/ptq/presets/model/w4a16_nvfp4

metadata:
  recipe_type: auto_quantize
  description: >-
    Qwen3.6 MoE: FP8 + NVFP4-weight-only per-layer search at 6.0 effective bits, active-MoE
    cost model (expert ratio 0.03125), with architecture-specific disabled layers.

auto_quantize:
  constraints:
    effective_bits: 6.0
    cost_model: active_moe
    cost:
      active_moe_expert_ratio: 0.03125

  candidate_formats:
    - $import: fp8
    - $import: w4a16_nvfp4

  auto_quantize_method: gradient
  score_size: 128

  # Shared base patterns spliced in; this architecture adds the Qwen MoE shared-expert gate.
  disabled_layers:
    - $import: base_disabled_layers
    - "*shared_expert_gate*"

  # VL model: kept out of the bit-budget denominator (cost_weight 0) so they don't inflate the
  # budget. Same patterns are also in disabled_layers above (excluded from search) — cost-exclusion
  # is a separate, independent role.
  cost_excluded_layers:
    - "*visual*"
    - "*mtp*"
    - "*vision_tower*"
