# Mixed-precision PTQ recipe for Nemotron-3-Nano-4B model.
#
# Precision mirrors the GGUF Q4_K_M bit allocation (see
# nemotron3_nano_4b_q4_k_m_layers.txt) mapped onto NVFP4 / FP8:
#   Q4_K, Q5_0 weights   →  NVFP4 W4A4   (in_proj, out_proj, up_proj, attn q/k/v/o_proj,
#                                         and down_proj of layers 13,15,20,22,27,29,37,39)
#   Q6_K weights         →  FP8 W8A8     (MLP down_proj of layers 1,3,5,8,10,18,25,33,41)
#   Q8_0 weights         →  attn v_proj of 24,32 stays NVFP4 W4A4 (q/k/v are fused on export and
#                            must share one format); lm_head → FP8 W8A16 (see below)
#   embeddings           →  NVFP4 W4A16  (weight-only; overrides its Q5_0 GGUF type)
#   lm_head              →  FP8 W8A16    (weight-only; overrides its Q8_0 GGUF type)
#   everything else (F32: conv1d, norms, A_log/D/dt_bias)  →  bf16

imports:
  base_disable_all: configs/ptq/units/base_disable_all
  w4a4_nvfp4_nvfp4: configs/ptq/units/w4a4_nvfp4_nvfp4
  default_disabled_quantizers: configs/ptq/units/default_disabled_quantizers
  fp8: configs/numerics/fp8
  nvfp4: configs/numerics/nvfp4

metadata:
  recipe_type: ptq
  description: >-
    GGUF Q4_K_M-mirrored Nemotron-H recipe: NVFP4 W4A4 for Q4_K/Q5_0 linears
    (attn q/k/v/o kept uniform for export fusion), FP8 W8A8 for Q6_K MLP
    down_proj, NVFP4 W4A16 for embedding, FP8 W8A16 for lm_head, bf16 for F32.

quantize:
  algorithm: max
  quant_cfg:
    - $import: base_disable_all
    # NVFP4 W4A4 default for every linear (Q4_K / Q5_0 tensors).
    - $import: w4a4_nvfp4_nvfp4

    # Q6_K MLP down_proj → FP8 W8A8 (layers 1, 3, 5, 8, 10, 18, 25, 33, 41).
    - quantizer_name: '*layers.1.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.1.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.3.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.3.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.5.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.5.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.8.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.8.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.10.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.10.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.18.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.18.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.25.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.25.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.33.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.33.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.41.mixer.down_proj*weight_quantizer'
      cfg:
        $import: fp8
    - quantizer_name: '*layers.41.mixer.down_proj*input_quantizer'
      cfg:
        $import: fp8

    # Standard exclusions (lm_head, embedding, conv1d, BatchNorm, etc.) → bf16
    - $import: default_disabled_quantizers

    # lm_head → FP8 W8A16 (weight-only); embedding → NVFP4 W4A16 (weight-only).
    # Re-enable the weight quantizers that default_disabled_quantizers turned off.
    - quantizer_name: '*lm_head*weight_quantizer'
      enable: true
      cfg:
        $import: fp8
    - quantizer_name: '*embeddings*weight_quantizer'
      enable: true
      cfg:
        $import: nvfp4
