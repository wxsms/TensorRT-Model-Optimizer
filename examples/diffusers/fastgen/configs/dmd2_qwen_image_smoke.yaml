# DMD2 on Qwen-Image — mock-data wiring smoke (NOT for real training).
#
# Feeds random tensors at Qwen-Image's shapes/dtypes via
# ``build_mock_t2i_dataloader``. Useful for end-to-end wiring tests (FSDP2,
# phase routing, checkpoint save/restore) but useless for image quality — real
# training uses ``dmd2_qwen_image.yaml`` (real cache + CFG + GAN).

seed: 42

wandb:
  project: fastgen-dmd2-qwen-image
  mode: online
  name: phase1_smoke

dist_env:
  backend: nccl
  timeout_minutes: 60

model:
  # Qwen-Image text-to-image checkpoint (HF id, or a local snapshot path to
  # avoid hitting HF on every job).
  pretrained_model_name_or_path: Qwen/Qwen-Image
  mode: finetune

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 100
  num_epochs: 1
  log_every: 1
  # Hard cap the Phase 1 smoke at 100 optimizer steps. Flip to null for full runs.
  max_steps: 100

# ─── DMD2-specific block ────────────────────────────────────────────────────────────
dmd2:
  # Built-in fastgen recipe for Qwen-Image: pred_type=flow, num_train_timesteps=null
  # (Qwen normalises t internally), logit_normal time sampling, student_update_freq=5,
  # fake_score_pred_type=x0, gan_loss_weight_gen=0 (Phase 1), EMA on.
  recipe_path: general/distillation/dmd2_qwen_image

  # Phase 1 overrides:
  # * GAN disabled — no discriminator shipped in Phase 1.
  # * CFG disabled — no negative-prompt embedding precompute yet; guidance_scale=null
  #   short-circuits the negative-conditioning branch inside compute_student_loss.
  gan_loss_weight_gen: 0.0
  guidance_scale:

  # Phase-1-only knobs (NOT on DMDConfig — consumed directly by the recipe):
  # LR for the fake-score AdamW; matches the student LR below.
  fake_score_lr: 1.0e-5

  # Explicit pipeline plugin selector. Auto-detect via model_id substring works for a
  # local Qwen-Image snapshot path, but spelling it out keeps the choice visible.
  pipeline_plugin: qwen_image

  # Optional guidance scalar forwarded to the transformer's ``guidance`` kwarg every
  # call. The shipped ``Qwen/Qwen-Image`` checkpoint has guidance_embeds=false, so
  # leave this null. Set to e.g. 3.5 only if you've fine-tuned a guidance-embed
  # variant.
  qwen_image_guidance:

# Student LR + optimizer.
optim:
  learning_rate: 1.0e-5
  optimizer:
    weight_decay: 0.01
    betas: [0.9, 0.999]

# Constant LR for the smoke — flip to cosine/linear once the loop is validated.
lr_scheduler:
  lr_decay_style: constant
  lr_warmup_steps: 0
  min_lr: 1.0e-5

# FSDP2 config. Scale dp_size to match the GPU count of the run.
fsdp:
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  dp_size: 8
  activation_checkpointing: true

# Mock data by default — the debug target is the DMD2 loop, not the data pipeline.
# Swap _target_ to build_text_to_image_multiresolution_dataloader once a real
# preprocessed cache is available.
data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_mock_t2i_dataloader
    # Qwen-Image VAE: 16 latent channels, 8x spatial downsample.
    # 256x256 image -> 32x32 latent. Must be even (2x2 patch packing).
    num_channels: 16
    spatial_h: 32
    spatial_w: 32
    # Qwen2.5-VL hidden_dim = 3584 (text_encoder/config.json: hidden_size=3584).
    text_seq_len: 512
    text_embed_dim: 3584
    length: 256
    num_workers: 0
    shuffle: true

checkpoint:
  enabled: true
  checkpoint_dir: /path/to/output/qwen_image_dmd2_smoke/checkpoints
  model_save_format: torch_save
  save_consolidated: false
  diffusers_compatible: false
  # Set to LATEST or epoch_0_step_100 (etc.) to resume. Null = start fresh.
  restore_from:
