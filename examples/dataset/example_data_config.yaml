outputs:
  - filename: "input_conversations/train.jsonl"
    global_limit: 50000
    sources:
      - name: "sharegpt"
        splits:
          all: 0
      - name: "ultrachat"
        # UltraChat's loader yields prompt-only turns (no assistant completions),
        # which makes answer_only_loss=true mask nothing. Use daring-anteater below.
        splits:
          train_gen: 0
          train_sft: 0
      - name: "mtbench"
        splits:
          all: 0
      - name: "daring-anteater"
        # Multi-turn SFT conversations WITH assistant completions (real split: train).
        splits:
          train: 50000
      - name: "magpie"
        splits:
          300k: 0
          500k: 0
          1M: 0
      - name: "nemotron-post-training-v2"
        splits:
          chat: 0
          stem: 0
          math: 0
          code: 0
          multilingual_ja: 0
          multilingual_it: 0
          multilingual_de: 0
          multilingual_es: 0
          multilingual_fr: 0
