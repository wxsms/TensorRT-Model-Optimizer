defaults:
  - nemotron_nano_v3
  - _self_

# Input Hugging Face model to compress
input_hf_model_path: /workspace/hf-models/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16/

# Dataset path for pruning and NAS scoring
dataset_path: /workspace/datasets/Puzzle-KD-Nemotron-Post-Training-Dataset-v2

# Working directory for compression outputs
puzzle_dir: /workspace/any_model_nemotron3-Nano-30b-A3b/

# MIP memory constraint (in MiB) 
mip:
  mip_constraints:
    stats.num_local_experts: 1472 #23 * 128 = 2944
  human_constraints:

# FFN intermediate sizes to search over (heterogeneous architecture)
# teacher_intermediate_size is 20480
pruning:
  intermediate_size_list: [6144, 12288, 18432, 24576]
