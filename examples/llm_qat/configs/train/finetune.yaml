# Full-precision fine-tuning (no quantization)

# Model
model_name_or_path:  # e.g., Qwen/Qwen3-8B
output_dir:  # e.g., qwen3-8b-finetune

# Dataset
dataset_config: configs/dataset/blend.yaml
train_samples: 20000
eval_samples: 2000

# Hyperparameters
num_train_epochs: 1.0
learning_rate: 1e-5
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 2
model_max_length: 4096
warmup_ratio: 0.05
lr_scheduler_type: cosine
gradient_checkpointing: true
seed: 42

# Checkpointing
load_best_model_at_end: true
save_total_limit: 2

# Evaluation
do_eval: true
eval_on_start: true
eval_strategy: steps
eval_steps: 50

# Logging
logging_steps: 1
report_to:
  - tensorboard
