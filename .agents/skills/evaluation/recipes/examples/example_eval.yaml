# Example: AA-aligned eval template (single-task starting point)
#
# Minimal config to validate a quantized model end-to-end against one AA-style
# benchmark. The agent extends this template by copying additional task
# fragments from recipes/tasks/aa/*.md into the `evaluation.tasks` list — task
# references define benchmark requirements and YAML fragments, this file
# defines the deployment + operational conventions.
#
# Includes (default): ns_gpqa (nemo-skills harness, num_repeats=16, AA mcq-4choices).
# Add more AA tasks per recipes/tasks/aa/ and the AA suite rule in SKILL.md.
#
# Usage:
#   nel run --config recipes/examples/example_eval.yaml \
#     -o deployment.checkpoint_path=/path/to/quantized/checkpoint \
#     -o deployment.served_model_name=my-model-nvfp4 \
#     -o execution.hostname=<slurm_host> \
#     -o execution.account=<slurm_account> \
#     -o execution.output_dir=/path/to/output
#
# For quantized checkpoints, do not add a vLLM quantization flag by default.
# Recent vLLM reads ModelOpt quantization metadata from the checkpoint. Only add
# an explicit flag if the model card, vLLM version, or dry-run error requires it.
#
# Deployment uses a single `command:` field instead of separate
# `tensor_parallel_size` / `data_parallel_size` / `extra_args` fields — the full
# `vllm serve` invocation lives in the command string. NEL mounts a
# `checkpoint_path` at /checkpoint inside the container, and Hydra interpolates
# ${deployment.port} at run time.
#
# PREFER `checkpoint_path` (a path already on the cluster) over `hf_model_handle`.
# `hf_model_handle` is NOT reliably mounted at /checkpoint in current NEL — the
# `vllm serve /checkpoint` command then makes vLLM treat "/checkpoint" as a HF
# repo id and the deploy dies with `HFValidationError: Repo id must use ...`.
# To eval an un-staged HF model, first download it to the cluster (e.g.
# `huggingface_hub.snapshot_download`) and point `checkpoint_path` at it.
#
# Run a single task:
#   nel run --config ... -t ns_gpqa
#
# Canary (2 samples): use this before a full run to validate logs and tune
# parallelism.
#   nel run --config ... -o ++evaluation.nemo_evaluator_config.config.params.limit_samples=2
defaults:
  # slurm/default works anywhere; if your install ships a predefined
  # internal/slurm/<cluster> config, prefer it (see SKILL.md Step 4).
  - execution: slurm/default
  - deployment: vllm
  - _self_
cluster:
  sbatch_comment: '{"OccupiedIdleGPUsJobReaper":{"exemptIdleTimeMins":"480","reason":"benchmarking","description":"Eval benchmark low GPU utilization"}}'
execution:
  hostname: ???
  username: ${oc.env:USER}
  account: ???
  output_dir: ???
  walltime: "04:00:00"
  # gres: a predefined internal/slurm/<cluster> config (see SKILL Step 4) sets this.
  # On the slurm/default fallback it's gpu:8 — set to the node's GPU count or sbatch
  # fails "Requested node configuration is not available" (4-GPU GB300 -> gpu:4).
  mounts:
    # mount_home ALWAYS false: true mounts host ~/.cache, which (if a shared-fs symlink) dangles
    # in-container -> vLLM deploy dies "FileNotFoundError /root/.cache/huggingface" (unseen by
    # --dry-run). Instead mount the real HF cache to /hf-cache + set HF_HOME below. See SKILL Step 4.
    mount_home: false
    # deployment: { <shared-fs>/<user>/.cache/huggingface: /hf-cache }
    # evaluation: { <shared-fs>/<user>/.cache/huggingface: /hf-cache }
  auto_export:          # REQUIRED trigger for auto-export. Without this, the
    destinations:       # export.mlflow block below is ignored and the run is
      - mlflow          # NOT uploaded — you'd have to `nel export` it by hand.
  # Auto-export is a separate CPU-only sbatch; GPU-only partitions reject it ("Cannot
  # find GPU specification") → export silently fails. Set a CPU partition (gcp-nrt: cpu).
  cpu_partition: ???
deployment:
  env_vars:
    HF_TOKEN: host:HF_TOKEN
    HF_HOME: lit:/hf-cache    # with the /hf-cache mount above
    # vLLM backend env vars go HERE, not in the command below. Some models need
    # a card-documented toggle — e.g. NVFP4 MoE (NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4)
    # needs FlashInfer FP4 kernels. Uncomment per card (`lit:` prefix, Step 5):
    #   VLLM_USE_FLASHINFER_MOE_FP4: lit:1
    #   VLLM_FLASHINFER_MOE_BACKEND: lit:throughput
  checkpoint_path: ???
  hf_model_handle:
  served_model_name: ???
  image: vllm/vllm-openai:v0.19.1
  # NVFP4 on Blackwell B300/GB300 (sm_103): append `-cu130` to the (multi-arch)
  # image tag — the default cu12 build has no sm_103 FP4 kernel, so the deploy
  # dies at engine init with CUDA "no kernel image is available". e.g.:
  #   image: vllm/vllm-openai:v0.19.1-cu130
  # If a pinned release predates your model's arch, use the nightly instead
  # (Qwen3.5-9B's qwen3_5 needed vllm/vllm-openai:cu130-nightly-x86_64, 0.19.2rc1.dev134).
  # Multimodal on sm_103 may also need `--mm-encoder-attn-backend TRITON_ATTN`
  # (ViT flash-attn workaround; drop if the encoder loads without it).
  #
  # `--served-model-name` (in command below) is REQUIRED — else vLLM serves the
  # model as `/checkpoint` and eval requests 404 ("model does not exist").
  # For MoE models, add `--enable-expert-parallel` to the command.
  # For models with custom code, add `--trust-remote-code` to the command.
  # `--model-loader-extra-config` enables multithreaded checkpoint loading (on by
  # default below) — cuts large-checkpoint load from tens of minutes to a few;
  # tune num_threads to the checkpoint size / shared-FS read bandwidth.
  # After filling in evaluation `parallelism` values (top-level + per-task),
  # append `--max-num-seqs N` to the command where
  # N = ceil(max_parallelism / data_parallel_size).
  command: >-
    vllm serve /checkpoint
    --served-model-name ${deployment.served_model_name}
    --host 0.0.0.0
    --port ${deployment.port}
    --tensor-parallel-size 1
    --data-parallel-size 1
    --max-model-len 131072
    --model-loader-extra-config '{"enable_multithread_load": true, "num_threads": 128}'
    --max-num-batched-tokens 8192
    --enable-chunked-prefill
evaluation:
  env_vars:
    HF_TOKEN: host:HF_TOKEN
    HF_HOME: lit:/hf-cache    # with the /hf-cache mount above
    # nemo-skills tasks (ns_*) hard-require the served-endpoint api key env var
    # (api_key_name below) to be set WITH A VALUE inside the eval container.
    # A shell `export DUMMY_API_KEY=dummy` does NOT reach the SLURM container —
    # it must be declared here. Omit it and ns_* tasks die with
    # "api_key_env_var=DUMMY_API_KEY but the value is not set".
    DUMMY_API_KEY: lit:dummy
  nemo_evaluator_config:
    config:
      params:
        parallelism: ???  # Number of concurrent requests per each benchmark
        request_timeout: 3600
        max_retries: 10
        max_new_tokens: 65536  # 64K for reasoning models; use 16384 (16K) for non-reasoning; prefer model card value
        temperature: 1.0       # from model card (reasoning mode); adjust per card
        top_p: 0.95            # from model card (reasoning mode); adjust per card
    target:
      api_endpoint:
        api_key_name: DUMMY_API_KEY
        # Adapter (interceptor) config. `use_reasoning` strips reasoning/CoT
        # traces before scoring — see SKILL.md "Reasoning adapter config" for
        # when to enable it (reasoning models only; instruct models -> false)
        # and how to force thinking on via chat_template_kwargs.
        adapter_config:
          use_caching: true
          use_request_logging: true
          max_logged_requests: 2
          use_response_logging: true
          max_logged_responses: 2
          use_reasoning: true            # true for reasoning models; false for instruct
          log_failed_requests: true
          params_to_add:
            # Forces thinking on for hybrid models that can run both modes.
            # Drop this block for pure-instruct models. The thinking-toggle key
            # is family-specific — keep only the one your model uses:
            #   enable_thinking -> Qwen3.5/3.6, GLM 5.1
            #   thinking        -> Kimi K2.6, DeepSeek V3.2/V4
            # (DeepSeek models use a Python encoder, not Jinja, so an unused key
            # can error rather than be ignored — don't emit both.)
            chat_template_kwargs:
              thinking: true
              enable_thinking: true
              # DeepSeek V4 only: reasoning-effort axis (high|max). "max" needs
              # --max-model-len >= 393216. Uncomment for DeepSeek V4.
              # reasoning_effort: max
  tasks:
  # Reasoning (chat endpoint, short). nemo-skills GPQA on the AA 4-choice MCQ
  # prompt (golden Nemotron-3-Ultra harness); repeat count kept at this recipe's
  # prior value of 16.
    - name: ns_gpqa
      container: nvcr.io/nvidia/eval-factory/nemo-skills:26.03
      nemo_evaluator_config:
        config:
          params:
            extra:
              num_repeats: 16
              args: "++prompt_config=eval/aai/mcq-4choices"

export:
  # Use LITERAL values below — NOT ${deployment.*} / ${evaluation.*} cross-refs.
  # With auto_export enabled (above), NEL resolves this block at SUBMIT time in a
  # scope that does NOT include `deployment` / `evaluation`, so cross-references
  # fail hard: "Interpolation key 'deployment.served_model_name' not found".
  # `${oc.env:USER}` / `${oc.env:MLFLOW_TRACKING_URI}` (env-var interpolations) are fine.
  #
  # CAUTION — these literals can drift. temperature / top_p / max_new_tokens are the
  # ONLY queryable record of the sampling config in MLflow (NEL does not log them as
  # run params), so keep them — but because they can't be interpolated, they MUST be
  # kept EQUAL to evaluation.nemo_evaluator_config.config.params above. When you
  # change the sampling params (or served_model_name), update these literals in the
  # SAME edit, or MLflow will misreport the run.
  mlflow:
    tracking_uri: ${oc.env:MLFLOW_TRACKING_URI}   # from modelopttools:eval-config (canonical frontier-evals host; NOT the -nemo-evaluator alias)
    experiment_name: ${oc.env:USER}/CHANGEME-served-model-name
    description: 'CHANGEME-served-model-name | T=1.0, top_p=0.95, max_new_tokens=65536'
    log_logs: true
    log_artifacts: true
    only_required: false
    skip_existing: false
    tags:
      framework: vllm
      model: CHANGEME-served-model-name
      temperature: '1.0'
      top_p: '0.95'
      max_new_tokens: '65536'
